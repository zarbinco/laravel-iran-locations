name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    env:
      COMPOSER_POLICY_ADVISORIES_BLOCK: "0"

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.2'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.3'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.4'
            laravel: '11.*'
            testbench: '^9.0'
          - php: '8.2'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '12.*'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '13.*'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '13.*'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
          extensions: zip

      - name: Validate composer metadata
        run: composer validate --strict

      - name: Install dependencies
        run: |
          composer update \
            --prefer-dist \
            --no-interaction \
            --no-progress \
            --with-all-dependencies \
            --with "illuminate/contracts:${{ matrix.laravel }}" \
            --with "illuminate/database:${{ matrix.laravel }}" \
            --with "illuminate/routing:${{ matrix.laravel }}" \
            --with "illuminate/support:${{ matrix.laravel }}" \
            --with "orchestra/testbench:${{ matrix.testbench }}"

      - name: Run tests
        run: composer test

      - name: Check code style
        run: composer run-script format:test

      - name: Run static analysis
        run: composer analyse

  release-gate:
    name: Release gate / archive hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
          extensions: zip

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --with-all-dependencies

      - name: Report dependency advisories
        run: composer audit || true

      - name: Run release gate
        run: composer run-script release:check
